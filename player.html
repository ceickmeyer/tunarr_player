<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunarr Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
    <script>(function(){var c=JSON.parse(localStorage.getItem('tunarr_config')||'{}');if(c.colorTheme)document.documentElement.setAttribute('data-theme',c.colorTheme);})()</script>
</head>
<body>
    <header>
        <div class="player-header">
            <a href="index.html" class="back-button">← Guide</a>
            <h1 id="channel-name">Channel</h1>
            <div class="spacer"></div>
        </div>
    </header>

    <main>
        <section class="player-section">
            <div class="video-wrapper">
                <video id="video-player" controls></video>
            </div>
            <div class="player-controls">
                <div class="stream-info">
                    <span id="current-program">Loading...</span>
                </div>
                <button id="pip-btn" class="pip-btn">⧉ Picture in Picture</button>
                <button id="reload-stream" class="reload-btn">
                    <svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 16q0-2.784 1.088-5.312t2.912-4.384 4.384-2.912 5.344-1.088q2.784 0 5.312 1.088t4.384 2.912 2.912 4.384 1.088 5.312h2.304q0.736 0 1.28 0.416t0.8 1.024 0.16 1.28-0.64 1.184l-4.576 4.576q-0.672 0.672-1.6 0.672t-1.632-0.672l-4.576-4.576q-0.512-0.512-0.608-1.184t0.128-1.28 0.8-1.024 1.312-0.416h2.272q0-2.464-1.216-4.576t-3.328-3.328-4.576-1.216-4.608 1.216-3.328 3.328-1.216 4.576 1.216 4.608 3.328 3.328 4.608 1.216q1.728 0 3.36-0.64l3.424 3.392q-3.136 1.824-6.784 1.824-2.816 0-5.344-1.088t-4.384-2.912-2.912-4.384-1.088-5.344z" fill="currentColor"/>
                    </svg>
                    Reload
                </button>
            </div>
        </section>

        <section class="guide-section">
            <div class="guide-wrapper" id="guide-wrapper">
                <div class="guide-time-row">
                    <div class="channel-label-spacer"></div>
                    <div class="time-ruler" id="time-ruler"></div>
                </div>
                <div id="guide-container"></div>
                <div class="current-time-line" id="current-time-line"></div>
            </div>
        </section>
    </main>

    <!-- Global floating tooltip -->
    <div id="global-tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
