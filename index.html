<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunarr Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
</head>
<body>
    <header>
        <h1>Tunarr TV Guide</h1>
        <div class="time-display">Current Time: <span id="current-time"></span></div>
        <nav class="header-nav">
            <button id="shuffle-btn" class="nav-btn">🔀 Shuffle</button>
            <a href="config.html" class="nav-btn">⚙ Config</a>
            <a href="#" id="tunarr-link" target="_blank" class="nav-btn">Tunarr ↗</a>
        </nav>
    </header>

    <main class="guide-main">
        <div class="guide-wrapper" id="guide-wrapper">

            <!-- Time ruler: spacer | time markers | zoom+nav controls -->
            <div class="guide-time-row">
                <div class="channel-label-spacer"></div>
                <div class="time-ruler" id="time-ruler">
                    <!-- time markers + current-time bubble injected by JS -->
                </div>
            </div>

            <!-- Channel rows -->
            <div id="guide-container"></div>

            <!-- Vertical time indicator — spans full guide-wrapper height -->
            <div class="current-time-line" id="current-time-line"></div>

        </div>
    </main>

    <div id="global-tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
